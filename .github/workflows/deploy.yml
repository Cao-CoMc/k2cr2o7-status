name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'data/**'
      - '**.md'
  schedule:
    # 每5分钟运行一次（UTC时间）
    # 注意：GitHub Actions 定时任务可能有延迟（3-10分钟）
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        # 获取完整历史，避免 shallow clone 问题
        fetch-depth: 0

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Restore status history
      uses: actions/cache@v3
      with:
        path: data
        key: server-status-${{ github.run_id }}
        restore-keys: |
          server-status-

    - name: Install dependencies
      run: |
        npm install
        echo "✅ Dependencies installed"

    - name: Fetch server status
      id: fetch
      run: node scripts/fetch-status.js
      continue-on-error: true

    - name: Build static site
      run: node scripts/build-static.js

    - name: Save status history
      uses: actions/cache@v3
      with:
        path: data
        key: server-status-${{ github.run_id }}

    - name: Commit and push changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add -A
        git diff --quiet && git diff --staged --quiet || (git commit -m "Update server status [$(date)]" && git push)
      continue-on-error: true

    - name: Setup Pages
      uses: actions/configure-pages@v4

    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: './dist'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Print deployment URL
        run: |
          echo "🌐 Site deployed to: ${{ steps.deployment.outputs.page_url }}"
