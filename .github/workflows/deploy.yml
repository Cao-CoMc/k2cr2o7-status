name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'data/**'
      - '**.md'
  schedule:
    # 每5分钟自动更新一次
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        # 禁用缓存避免权限问题
        # cache: 'npm'

    - name: Restore status history
      uses: actions/cache@v3
      with:
        path: data
        key: server-status-${{ github.run_id }}
        restore-keys: |
          server-status-

    - name: Install dependencies
      # 使用 npm install 代替 npm ci，避免缓存问题
      run: |
        npm install
        echo "✅ Dependencies installed"

    - name: Fetch server status
      id: fetch
      run: node scripts/fetch-status.js
      continue-on-error: true

    - name: Build static site
      run: node scripts/build-static.js

    - name: Save status history
      uses: actions/cache@v3
      with:
        path: data
        key: server-status-${{ github.run_id }}

    - name: Setup Pages
      uses: actions/configure-pages@v4

    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: './dist'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Print deployment URL
        run: |
          echo "🌐 Site deployed to: ${{ steps.deployment.outputs.page_url }}"
